{% extends 'main.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% block content %}
    <!-- <h1>this is register page</h1>
    <hr> -->
    <div class="register_form">
        <center><h2 id="h2_text">SIGN UP</h2></center>
        
        <form action="" method="post">
            {% csrf_token %}
            <center><input type="text" name="reg_username" id="reg_username" placeholder="enter your username"> <br><br>
            <input type="password" name="reg_password" id="reg_password" placeholder="enter your password"> <br><br>
            <input type="password" name="reg_re_password" id="reg_re_password" placeholder="confirm your password"> <br><br>
            <input type="submit" name="register" id="reg_register" class="btn btn-primary" value="Sign Up"></center>
        </form>
    </div>
    {% endblock %}
</body>
</html>
